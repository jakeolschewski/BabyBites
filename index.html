<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BabyBites: AI-powered baby e-commerce with dropshipping and parenting tools by Jacob Olszewski">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://unpkg.com https://aframe.io https://www.gstatic.com https://js.stripe.com https://cdn.dialogflow.com 'unsafe-eval'; style-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; img-src 'self' data: https://images.unsplash.com https://www.amazon.com; connect-src 'self' https://api.cjdropshipping.com https://firestore.googleapis.com https://api.stripe.com https://api.shippo.com https://api.dialogflow.com https://api.vertex.ai.google.com https://babybites-workers.cloudflare.com https://us-central1-babybites.cloudfunctions.net https://api.sendgrid.com; manifest-src 'self';">
    <meta name="robots" content="index, follow">
    <meta name="keywords" content="baby products, AI, dropshipping, parenting, BabyBites">
    <meta property="og:title" content="BabyBites - AI-Powered Baby E-Commerce">
    <meta property="og:description" content="Shop smarter with AI-driven baby bundles by Jacob Olszewski">
    <meta property="og:image" content="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80">
    <meta property="og:url" content="https://babybites.vercel.app">
    <meta name="twitter:card" content="summary_large_image">
    <title>BabyBites: AI-Powered Baby E-Commerce</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <link rel="manifest" href="/manifest.json">
    <style>
        body { min-height: 100vh; background: linear-gradient(to bottom right, #fefce8, #e0e7ff); color: #1e40af; transition: all 0.5s; }
        .dark body { background: #1f2937; color: #f9fafb; }
        .high-contrast body { background: #000; color: #fef08a; }
        .colorblind body { background: #e6e6e6; color: #005a9c; }
        @keyframes heartPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        .animate-heartpulse { animation: heartPulse 1.2s infinite; }
        .loading::after { content: ''; display: inline-block; width: 14px; height: 14px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 6px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 50; display: none; }
        .modal.active { display: block; }
        .sticky-cart { position: fixed; top: 4rem; right: 1rem; background: #fff; padding: 1rem; border-radius: 0.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 40; }
        [tabindex]:focus { outline: 2px solid #f472b6; }
        @media (max-width: 640px) {
            h2 { font-size: 1.25rem; }
            button, input { font-size: 0.75rem; padding: 0.5rem; }
            .grid-cols-3, .grid-cols-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/@tensorflow/tfjs@4.21.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-federated@0.20.0/dist/tf-federated.min.js"></script>
    <script src="https://unpkg.com/@huggingface/transformers@2.10.0/dist/transformers.min.js"></script>
    <script src="https://js.stripe.com/v3/"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-functions.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.min.js"></script>
    <script type="module">
        import React, { useState, useEffect, useCallback, memo } from 'https://cdn.jsdelivr.net/npm/react@18.2.0/+esm';
        import ReactDOM from 'https://cdn.jsdelivr.net/npm/react-dom@18.2.0/+esm';
        const { initializeApp } = firebase;
        const { getAuth, createUserWithEmailAndPassword, onAuthStateChanged, signOut } = firebase.auth;
        const { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs } = firebase.firestore;

        // Firebase Config (replace with your own)
        const firebaseConfig = {
            apiKey: "YOUR_FIREBASE_API_KEY",
            authDomain: "babybites.firebaseapp.com",
            projectId: "babybites",
            storageBucket: "babybites.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // UUID for tracking
        const uuid = () => crypto.randomUUID();

        // IndexedDB Setup
        const openDB = () => new Promise((resolve, reject) => {
            const request = indexedDB.open('BabyBitesDB', 2);
            request.onupgradeneeded = e => {
                const db = e.target.result;
                db.createObjectStore('profiles', { keyPath: 'id' });
                db.createObjectStore('interactions', { keyPath: 'id' });
                db.createObjectStore('cart', { keyPath: 'id' });
                db.createObjectStore('nursery', { keyPath: 'id' });
                db.createObjectStore('reviews', { keyPath: 'id' });
                db.createObjectStore('subscriptions', { keyPath: 'id' });
            };
            request.onsuccess = e => resolve(e.target.result);
            request.onerror = e => reject(e.target.error);
        });

        // Federated Learning Model
        const federatedModel = async () => {
            const model = tf.sequential({
                layers: [
                    tf.layers.dense({ units: 16, activation: 'relu', inputShape: [3] }),
                    tf.layers.dense({ units: 1, activation: 'sigmoid' })
                ]
            });
            return model;
        };

        // TensorFlow.js Deep Q-Network (DQN) Mock
        const qTable = new Map();
        const getReward = (bundle) => bundle.reduce((sum, p) => sum + p.price * p.margin * p.demand, 0);

        // Serverless/Edge Fetch
        const fetchFromServerless = async (endpoint, data) => {
            try {
                const response = await fetch(`https://us-central1-babybites.cloudfunctions.net/${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                return await response.json();
            } catch (e) {
                console.error('Serverless fetch failed:', e);
                return null;
            }
        };

        const fetchFromEdge = async (endpoint, data) => {
            try {
                const response = await fetch(`https://babybites-workers.cloudflare.com/${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                return await response.json();
            } catch (e) {
                console.error('Edge fetch failed:', e);
                return null;
            }
        };

        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(e => console.error('Service Worker failed:', e));
        }

        // Main App Component
        const App = memo(() => {
            const [user, setUser] = useState(null);
            const [cart, setCart] = useState([]);
            const [points, setPoints] = useState(0);
            const [tier, setTier] = useState('Bronze');
            const [theme, setTheme] = useState(localStorage.getItem('theme') || 'default');
            const [language, setLanguage] = useState(navigator.language.split('-')[0] || 'en');
            const [bundles, setBundles] = useState([]);
            const [chatQuery, setChatQuery] = useState('');
            const [chatResponse, setChatResponse] = useState('Ask away!');
            const [loading, setLoading] = useState({ bundles: false, chatbot: false, consent: false, analytics: false, reviews: false, subscriptions: false });
            const [error, setError] = useState(null);
            const [flConsent, setFlConsent] = useState(localStorage.getItem('flConsent') === 'true');
            const [twoFAEnabled, setTwoFAEnabled] = useState(false);
            const [challenge, setChallenge] = useState({ name: 'First Purchase', points: 50, timeLeft: 24 * 3600 });
            const [analytics, setAnalytics] = useState({ purchases: [], savings: 0 });
            const [reviews, setReviews] = useState([]);
            const [subscriptions, setSubscriptions] = useState([]);
            const [forumPosts, setForumPosts] = useState([]);

            // Auth and Storage Init
            useEffect(() => {
                const init = async () => {
                    onAuthStateChanged(auth, async u => {
                        if (!u) {
                            setUser(null);
                            return;
                        }
                        setUser(u);
                        const dbInstance = await openDB();
                        const tx = dbInstance.transaction(['profiles'], 'readonly');
                        const store = tx.objectStore('profiles');
                        const profile = await store.get(u.uid);
                        if (profile) {
                            setCart(profile.cart || []);
                            setPoints(profile.points || 0);
                            setTier(profile.tier || 'Bronze');
                            setTwoFAEnabled(profile.twoFAEnabled || false);
                        }
                        localStorage.setItem('theme', theme);
                        localStorage.setItem('language', language);
                        document.body.className = theme;
                        // Fetch analytics
                        setLoading(prev => ({ ...prev, analytics: true }));
                        try {
                            const purchases = await getDocs(collection(db, `carts/${u.uid}/purchases`));
                            const purchaseData = purchases.docs.map(doc => doc.data());
                            const savings = purchaseData.reduce((sum, p) => sum + (p.originalPrice - p.price), 0);
                            setAnalytics({ purchases: purchaseData, savings });
                        } catch (e) {
                            setError('Failed to load analytics');
                        } finally {
                            setLoading(prev => ({ ...prev, analytics: false }));
                        }
                        // Fetch reviews
                        setLoading(prev => ({ ...prev, reviews: true }));
                        try {
                            const reviewData = await fetchFromServerless('reviews', { userId: u.uid });
                            setReviews(reviewData?.reviews || []);
                        } catch (e) {
                            setError('Failed to load reviews');
                        } finally {
                            setLoading(prev => ({ ...prev, reviews: false }));
                        }
                        // Fetch subscriptions
                        setLoading(prev => ({ ...prev, subscriptions: true }));
                        try {
                            const subData = await fetchFromServerless('subscriptions', { userId: u.uid });
                            setSubscriptions(subData?.subscriptions || []);
                        } catch (e) {
                            setError('Failed to load subscriptions');
                        } finally {
                            setLoading(prev => ({ ...prev, subscriptions: false }));
                        }
                        // Fetch forum posts
                        try {
                            const posts = await getDocs(collection(db, 'forum'));
                            setForumPosts(posts.docs.map(doc => doc.data()));
                        } catch (e) {
                            setError('Failed to load forum posts');
                        }
                    });
                };
                init();
            }, [theme, language]);

            // FL Consent Popup
            useEffect(() => {
                if (!flConsent && user && !localStorage.getItem('flConsent')) {
                    setTimeout(() => {
                        document.getElementById('fl-consent-modal')?.classList.add('active');
                    }, 1000);
                }
            }, [user, flConsent]);

            // AI-Driven Bundles (Serverless + Edge + FL + Dynamic Pricing + Inventory Alerts)
            useEffect(() => {
                if (!user || !flConsent) return;
                const loadBundles = async () => {
                    setLoading(prev => ({ ...prev, bundles: true }));
                    try {
                        let products = await fetchFromServerless('products', { userId: user.uid });
                        if (!products) {
                            products = await fetchFromEdge('products', { userId: user.uid });
                            if (!products) {
                                products = [
                                    { id: 'formula', name: 'Organic Formula', price: 29.99, margin: 0.4, demand: 0.8, originalPrice: 34.99, stock: 100 },
                                    { id: 'monitor', name: 'Smart Monitor', price: 199.99, margin: 0.5, demand: 0.9, originalPrice: 229.99, stock: 50 },
                                    { id: 'diapers', name: 'Eco Diapers', price: 39.99, margin: 0.45, demand: 0.7, originalPrice: 44.99, stock: 5 },
                                ];
                            }
                        }
                        // Dynamic pricing
                        products = products.map(p => ({
                            ...p,
                            price: p.price * (1 + (p.demand > 0.8 ? 0.05 : 0)) * (tier === 'Gold' ? 0.9 : tier === 'Silver' ? 0.95 : 1),
                            alert: p.stock < 10 ? `Only ${p.stock} left!` : null
                        }));
                        // Mock DQN
                        const state = user.uid;
                        if (!qTable.has(state)) qTable.set(state, products.map(() => Math.random()));
                        const actions = qTable.get(state);
                        const selectBundle = () => {
                            if (Math.random() < 0.1) return [products[Math.floor(Math.random() * products.length)]];
                            const bestIdx = actions.indexOf(Math.max(...actions));
                            return [products[bestIdx], products[(bestIdx + 1) % products.length]];
                        };
                        let bundle = selectBundle();
                        // Federated Learning
                        const model = await federatedModel();
                        const localData = tf.tensor2d(products.map(p => [p.price, p.margin, p.demand]));
                        const localLabels = tf.tensor2d(products.map(() => [Math.random()]));
                        await model.fit(localData, localLabels, { epochs: 1 });
                        const weights = model.getWeights().map(w => Array.from(w.dataSync()));
                        await fetchFromServerless('federated-update', { userId: user.uid, weights });
                        setBundles(bundle);
                        const reward = getReward(bundle);
                        actions[bundle[0].id] += 0.1 * (reward - actions[bundle[0].id]);
                        qTable.set(state, actions);
                        await addDoc(collection(db, 'interactions'), {
                            userId: user.uid,
                            action: 'view_bundle',
                            bundle: bundle.map(b => b.id),
                            timestamp: Date.now(),
                        });
                        // Email campaign
                        if (Math.random() < 0.1) {
                            await fetchFromServerless('send-email', {
                                userId: user.uid,
                                email: user.email,
                                content: `New ${bundle[0].name} bundle for $${bundle[0].price}! ${bundle[0].alert || ''}`
                            });
                        }
                    } catch (e) {
                        setError('Failed to load bundles');
                    } finally {
                        setLoading(prev => ({ ...prev, bundles: false }));
                    }
                };
                loadBundles();
            }, [user, flConsent, tier]);

            // Voice-Activated Chatbot
            const handleVoiceChat = useCallback(() => {
                if (!window.SpeechRecognition && !window.webkitSpeechRecognition) {
                    setError('Voice recognition not supported');
                    return;
                }
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                const recognition = new SpeechRecognition();
                recognition.lang = language;
                recognition.onresult = e => {
                    const query = e.results[0][0].transcript;
                    setChatQuery(query);
                    handleChat();
                };
                recognition.onerror = () => setError('Voice recognition failed');
                recognition.start();
            }, [handleChat, language]);

            // Chatbot (Serverless + Edge + Transformers.js + Multi-Language)
            const handleChat = useCallback(async () => {
                setLoading(prev => ({ ...prev, chatbot: true }));
                try {
                    const translatedQuery = await fetchFromEdge('translate', { text: chatQuery, targetLang: 'en' });
                    const serverlessResponse = await fetchFromServerless('chatbot', { query: translatedQuery?.text || chatQuery, userId: user?.uid });
                    let response = serverlessResponse?.response || null;
                    if (!response) {
                        const edgeResponse = await fetchFromEdge('chatbot', { query: translatedQuery?.text || chatQuery, userId: user?.uid });
                        response = edgeResponse?.response || 'Ask away!';
                        if (!edgeResponse && chatQuery.toLowerCase().includes('feed my baby')) {
                            const userDoc = await getDoc(doc(db, 'users', user.uid));
                            const age = userDoc.data()?.babyAge || 0;
                            response = age <= 6 ? 'Breast milk or formula every 2-3 hours. Try our Newborn Feeding Bundle!' : 'Pureed fruits and oats. See our Toddler Nutrition Bundle!';
                        }
                    }
                    const translatedResponse = await fetchFromEdge('translate', { text: response, targetLang: language });
                    setChatResponse(translatedResponse?.text || response);
                    await addDoc(collection(db, 'interactions'), {
                        userId: user?.uid,
                        query: chatQuery,
                        response,
                        timestamp: Date.now(),
                    });
                } catch (e) {
                    setChatResponse('Sorry, try again!');
                } finally {
                    setLoading(prev => ({ ...prev, chatbot: false }));
                }
            }, [chatQuery, user, language]);

            // Add to Cart (Serverless + Edge + Shippo)
            const addToCart = useCallback(async (item, price) => {
                setLoading(prev => ({ ...prev, bundles: true }));
                try {
                    let shipping = await fetchFromServerless('shipping', { item, userId: user.uid });
                    if (!shipping) {
                        shipping = await fetchFromEdge('shipping', { item, userId: user.uid });
                        if (!shipping) {
                            shipping = { details: 'USPS, 3-5 days, tracking #123456' };
                        }
                    }
                    const updatedCart = [...cart, { item, price, id: uuid(), shipping: shipping.details }];
                    setCart(updatedCart);
                    const newPoints = points + 50;
                    setPoints(newPoints);
                    const newTier = newPoints >= 1000 ? 'Gold' : newPoints >= 500 ? 'Silver' : 'Bronze';
                    setTier(newTier);
                    const dbInstance = await openDB();
                    const tx = dbInstance.transaction(['cart'], 'readwrite');
                    const store = tx.objectStore('cart');
                    await store.put({ id: user.uid, data: updatedCart });
                    await setDoc(doc(db, 'carts', user.uid), { cart: updatedCart });
                    await setDoc(doc(db, 'users', user.uid), { points: newPoints, tier: newTier }, { merge: true });
                } catch (e) {
                    setError('Failed to save cart');
                } finally {
                    setLoading(prev => ({ ...prev, bundles: false }));
                }
            }, [cart, points, user]);

            // Theme Toggle
            const toggleTheme = useCallback(() => {
                const themes = ['default', 'dark', 'high-contrast', 'colorblind'];
                const currentIdx = themes.indexOf(theme);
                const newTheme = themes[(currentIdx + 1) % themes.length];
                setTheme(newTheme);
                localStorage.setItem('theme', newTheme);
            }, [theme]);

            // Language Toggle
            const toggleLanguage = useCallback(lang => {
                setLanguage(lang);
                localStorage.setItem('language', lang);
            }, []);

            // Challenge Timer
            useEffect(() => {
                const timer = setInterval(() => {
                    setChallenge(prev => ({
                        ...prev,
                        timeLeft: prev.timeLeft > 0 ? prev.timeLeft - 1 : 24 * 3600,
                    }));
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            // FL Consent Handling
            const handleConsent = async (accept) => {
                setLoading(prev => ({ ...prev, consent: true }));
                try {
                    localStorage.setItem('flConsent', accept);
                    setFlConsent(accept);
                    if (user) {
                        await setDoc(doc(db, 'users', user.uid), { flConsent: accept }, { merge: true });
                    }
                    document.getElementById('fl-consent-modal')?.classList.remove('active');
                } catch (e) {
                    setError('Failed to save consent');
                } finally {
                    setLoading(prev => ({ ...prev, consent: false }));
                }
            };

            // 2FA Toggle
            const toggle2FA = async () => {
                setLoading(prev => ({ ...prev, consent: true }));
                try {
                    await fetchFromServerless('enable-2fa', { userId: user.uid });
                    setTwoFAEnabled(true);
                    await setDoc(doc(db, 'users', user.uid), { twoFAEnabled: true }, { merge: true });
                    alert('2FA enabled! Check your email/SMS for setup.');
                } catch (e) {
                    setError('Failed to enable 2FA');
                } finally {
                    setLoading(prev => ({ ...prev, consent: false }));
                }
            };

            // Subscribe to Plan
            const subscribeToPlan = async plan => {
                setLoading(prev => ({ ...prev, subscriptions: true }));
                try {
                    const subData = await fetchFromServerless('subscribe', { userId: user.uid, plan });
                    setSubscriptions(prev => [...prev, subData]);
                    await setDoc(doc(db, 'subscriptions', user.uid), { plans: [...subscriptions, subData] });
                    alert(`Subscribed to ${plan.name}!`);
                } catch (e) {
                    setError('Failed to subscribe');
                } finally {
                    setLoading(prev => ({ ...prev, subscriptions: false }));
                }
            };

            // Post Review
            const postReview = async (productId, rating, comment) => {
                setLoading(prev => ({ ...prev, reviews: true }));
                try {
                    const reviewData = { productId, rating, comment, userId: user.uid, timestamp: Date.now() };
                    await fetchFromServerless('post-review', reviewData);
                    setReviews(prev => [...prev, reviewData]);
                    const dbInstance = await openDB();
                    const tx = dbInstance.transaction(['reviews'], 'readwrite');
                    const store = tx.objectStore('reviews');
                    await store.put({ id: uuid(), ...reviewData });
                    await addDoc(collection(db, 'reviews'), reviewData);
                } catch (e) {
                    setError('Failed to post review');
                } finally {
                    setLoading(prev => ({ ...prev, reviews: false }));
                }
            };

            // Post to Forum
            const postToForum = async (title, content) => {
                try {
                    const postData = { title, content, userId: user.uid, timestamp: Date.now() };
                    await addDoc(collection(db, 'forum'), postData);
                    setForumPosts(prev => [...prev, postData]);
                } catch (e) {
                    setError('Failed to post to forum');
                }
            };

            // Sign Out
            const handleSignOut = async () => {
                await signOut(auth);
                setUser(null);
            };

            return (
                React.createElement('div', { className: `min-h-screen ${theme}`, role: 'main' },
                    error && React.createElement('div', { className: 'fixed top-4 left-4 bg-red-500 text-white p-2 rounded', role: 'alert' }, error),
                    React.createElement(Header, { toggleTheme, toggleLanguage, points, challenge, handleSignOut, user, tier, twoFAEnabled, toggle2FA }),
                    !user && React.createElement(SignUp, { setUser }),
                    user && React.createElement(Dashboard, { user, bundles, addToCart, loading, chatQuery, setChatQuery, chatResponse, handleChat, handleVoiceChat, analytics, tier, reviews, postReview, subscriptions, subscribeToPlan, forumPosts, postToForum, language }),
                    user && React.createElement(StickyCart, { cart }),
                    user && React.createElement(ConsentModal, { handleConsent, loading }),
                    user && React.createElement(VRNurseryDesigner, { user, addToCart }),
                    user && React.createElement(ProductComparison, { bundles, language }),
                    React.createElement(Footer)
                )
            );
        });

        // Header Component
        const Header = memo(({ toggleTheme, toggleLanguage, points, challenge, handleSignOut, user, tier, twoFAEnabled, toggle2FA }) => (
            React.createElement('header', { className: 'fixed top-0 w-full bg-gradient-to-r from-blue-300 to-pink-300 text-white p-4 shadow-lg z-50', role: 'banner' },
                React.createElement('div', { className: 'flex justify-between items-center max-w-7xl mx-auto' },
                    React.createElement('h1', { className: 'text-2xl font-bold animate-heartpulse', 'aria-label': 'BabyBites Logo' }, 'BabyBites'),
                    React.createElement('nav', { className: 'flex space-x-4', role: 'navigation' },
                        ['home', 'bundles', 'tools', 'community', 'nursery', 'analytics', 'compare'].map(item => (
                            React.createElement('a', { key: item, href: `#${item}`, className: 'hover:text-pink-100', tabIndex: 0 }, item.charAt(0).toUpperCase() + item.slice(1))
                        ))
                    ),
                    React.createElement('div', { className: 'flex items-center space-x-2' },
                        React.createElement('input', {
                            type: 'text',
                            placeholder: 'Search...',
                            className: 'p-2 rounded-full text-gray-900 w-40',
                            onKeyUp: () => alert('Search mocked'),
                            'aria-label': 'Search',
                            tabIndex: 0
                        }),
                        React.createElement('select', {
                            onChange: e => toggleLanguage(e.target.value),
                            className: 'p-2 rounded-full text-gray-900',
                            'aria-label': 'Select Language',
                            tabIndex: 0
                        }, ['en', 'es', 'fr'].map(lang => (
                            React.createElement('option', { key: lang, value: lang }, lang.toUpperCase())
                        ))),
                        React.createElement('button', {
                            onClick: toggleTheme,
                            className: 'p-2 bg-pink-400 rounded-full hover:bg-pink-500',
                            'aria-label': 'Toggle Theme',
                            tabIndex: 0

                const ctx = canvas.getContext('2d');
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;
                const gridSize = 20;
                let draggedItem = null;

                const snapToGrid = (val) => Math.round(val / gridSize) * gridSize;
                const draw = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#F3F4F6';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    for (let x = 0; x < canvas.width; x += gridSize) {
                        for (let y = 0; y < canvas.height; y += gridSize) {
                            ctx.fillStyle = '#E5E7EB';
                            ctx.fillRect(x, y, 1, 1);
                        }
                    }
                    items.forEach(item => {
                        ctx.fillStyle = item.id === 'crib' ? '#FFD1DC' : '#D1E7FF';
                        ctx.fillRect(item.x, item.y, item.width, item.height);
                        ctx.strokeStyle = '#333';
                        ctx.strokeRect(item.x, item.y, item.width, item.height);
                        ctx.fillStyle = '#333';
                        ctx.font = '12px Arial';
                        ctx.fillText(item.id, item.x + 5, item.y + 20);
                    });
                };

                const getItemAt = (x, y) => items.find(i => x >= i.x && x <= i.x + i.width && y >= i.y && y <= i.y + i.height);

                const handleDragStart = (e, isTouch = false) => {
                    const rect = canvas.getBoundingClientRect();
                    const x = isTouch ? e.touches[0].clientX - rect.left : e.clientX - rect.left;
                    const y = isTouch ? e.touches[0].clientY - rect.top : e.clientY - rect.top;
                    draggedItem = getItemAt(x, y);
                    if (draggedItem) {
                        draggedItem.offsetX = x - draggedItem.x;
                        draggedItem.offsetY = y - draggedItem.y;
                    }
                };

                const handleDragMove = (e, isTouch = false) => {
                    if (!draggedItem) return;
                    const rect = canvas.getBoundingClientRect();
                    const x = isTouch ? e.touches[0].clientX - rect.left : e.clientX - rect.left;
                    const y = isTouch ? e.touches[0].clientY - rect.top : e.clientY - rect.top;
                    draggedItem.x = snapToGrid(x - draggedItem.offsetX);
                    draggedItem.y = snapToGrid(y - draggedItem.offsetY);
                    draw();
                };

                canvas.addEventListener('mousedown', e => handleDragStart(e));
                canvas.addEventListener('mousemove', e => handleDragMove(e));
                canvas.addEventListener('mouseup', () => { draggedItem = null; });
                canvas.addEventListener('touchstart', e => { e.preventDefault(); handleDragStart(e, true); });
                canvas.addEventListener('touchmove', e => { e.preventDefault(); handleDragMove(e, true); });
                canvas.addEventListener('touchend', () => { draggedItem = null; });

                document.getElementById('save-vr-layout').addEventListener('click', async () => {

                    const tx = dbInstance.transaction(['nursery'], 'readwrite');
                    const store = tx.objectStore('nursery');
                    await store.put({ id: user.uid, items });
                    await setDoc(doc(db, 'nurseries', user.uid), { items });
                    alert('VR Nursery Layout Saved!');
                });

                draw();
                return () => {
                    canvas.removeEventListener('mousedown', () => {});
                    canvas.removeEventListener('mousemove', () => {});
                    canvas.removeEventListener('mouseup', () => {});
                    canvas.removeEventListener('touchstart', () => {});
                    canvas.removeEventListener('touchmove', () => {});
                    canvas.removeEventListener('touchend', () => {});
                };

                        'https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css',
                        'https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js',
                        'https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js'
                    ]);
                })
            );
        });
        self.addEventListener('fetch', e => {
            e.respondWith(
                caches.match(e.request).then(response => {
                    return response || fetch(e.request);
                })
            );
        });
    </script>
</body>
</html>
