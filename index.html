<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BabyBites: AI-powered baby e-commerce with dropshipping and parenting tools by Jacob Olszewski">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://unpkg.com https://aframe.io https://www.gstatic.com https://js.stripe.com https://cdn.dialogflow.com https://pagead2.googlesyndication.com 'unsafe-eval'; style-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; img-src 'self' data: https://images.unsplash.com https://www.amazon.com https://adservice.google.com; connect-src 'self' https://api.cjdropshipping.com https://firestore.googleapis.com https://api.stripe.com https://api.shippo.com https://api.dialogflow.com https://api.vertex.ai.google.com https://babybites-workers.cloudflare.com https://us-central1-babybites.cloudfunctions.net https://api.sendgrid.com https://api.x.com wss://babybites.firebaseio.com https://api.owletcare.com; manifest-src 'self';">
    <meta name="robots" content="index, follow">
    <meta name="keywords" content="baby products, AI, dropshipping, parenting, BabyBites">
    <meta property="og:title" content="BabyBites - AI-Powered Baby E-Commerce">
    <meta property="og:description" content="Shop smarter with AI-driven baby bundles by Jacob Olszewski">
    <meta property="og:image" content="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80">
    <meta property="og:url" content="https://babybites.vercel.app">
    <meta name="twitter:card" content="summary_large_image">
    <title>BabyBites: AI-Powered Baby E-Commerce</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <link rel="manifest" href="/manifest.json">
    <style>
        body { min-height: 100vh; background: linear-gradient(to bottom right, #fefce8, #e0e7ff); color: #1e40af; transition: all 0.5s; }
        .dark body { background: #1f2937; color: #f9fafb; }
        .high-contrast body { background: #000; color: #fef08a; }
        .colorblind body { background: #e6e6e6; color: #005a9c; }
        @keyframes heartPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        .animate-heartpulse { animation: heartPulse 1.2s infinite; }
        .loading::after { content: ''; display: inline-block; width: 14px; height: 14px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 6px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 50; display: none; }
        .modal.active { display: block; }
        .sticky-cart { position: fixed; top: 4rem; right: 1rem; background: #fff; padding: 1rem; border-radius: 0.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 40; }
        .live-chat { position: fixed; bottom: 1rem; right: 1rem; background: #fff; padding: 1rem; border-radius: 0.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 40; max-height: 300px; overflow-y: auto; }
        [tabindex]:focus { outline: 2px solid #f472b6; }
        @media (max-width: 640px) {
            h2 { font-size: 1.25rem; }
            button, input { font-size: 0.75rem; padding: 0.5rem; }
            .grid-cols-3, .grid-cols-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/@tensorflow/tfjs@4.21.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-federated@0.20.0/dist/tf-federated.min.js"></script>
    <script src="https://unpkg.com/@huggingface/transformers@2.10.0/dist/transformers.min.js"></script>
    <script src="https://js.stripe.com/v3/"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-functions.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-messaging.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.min.js"></script>
    <script type="module">
        import React, { useState, useEffect, useCallback, memo } from 'https://cdn.jsdelivr.net/npm/react@18.2.0/+esm';
        import ReactDOM from 'https://cdn.jsdelivr.net/npm/react-dom@18.2.0/+esm';
        const { initializeApp } = firebase;
        const { getAuth, createUserWithEmailAndPassword, onAuthStateChanged, signOut } = firebase.auth;
        const { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs } = firebase.firestore;
        const { getDatabase, ref, push, onValue } = firebase.database;
        const { getMessaging, getToken } = firebase.messaging;

        // Firebase Config (replace with your own)
        const firebaseConfig = {
            apiKey: "YOUR_FIREBASE_API_KEY",
            authDomain: "babybites.firebaseapp.com",
            projectId: "babybites",
            storageBucket: "babybites.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID",
            databaseURL: "https://babybites.firebaseio.com"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const rtdb = getDatabase(app);
        const messaging = getMessaging(app);

        // UUID for tracking
        const uuid = () => crypto.randomUUID();

        // IndexedDB Setup
        const openDB = () => new Promise((resolve, reject) => {
            const request = indexedDB.open('BabyBitesDB', 4);
            request.onupgradeneeded = e => {
                const db = e.target.result;
                db.createObjectStore('profiles', { keyPath: 'id' });
                db.createObjectStore('interactions', { keyPath: 'id' });
                db.createObjectStore('cart', { keyPath: 'id' });
                db.createObjectStore('nursery', { keyPath: 'id' });
                db.createObjectStore('reviews', { keyPath: 'id' });
                db.createObjectStore('subscriptions', { keyPath: 'id' });
                db.createObjectStore('quizzes', { keyPath: 'id' });
            };
            request.onsuccess = e => resolve(e.target.result);
            request.onerror = e => reject(e.target.error);
        });

        // Federated Learning Model (Transformer-based)
        const federatedModel = async () => {
            const model = await transformers.load_model('gpt2', { from_tf: true });
            return model;
        };

        // TensorFlow.js Deep Q-Network (DQN) Mock
        const qTable = new Map();
        const getReward = (bundle) => bundle.reduce((sum, p) => sum + p.price * p.margin * p.demand, 0);

        // Serverless/Edge Fetch
        const fetchFromServerless = async (endpoint, data) => {
            try {
                const response = await fetch(`https://us-central1-babybites.cloudfunctions.net/${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                return await response.json();
            } catch (e) {
                console.error('Serverless fetch failed:', e);
                return null;
            }
        };

        const fetchFromEdge = async (endpoint, data) => {
            try {
                const response = await fetch(`https://babybites-workers.cloudflare.com/${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                return await response.json();
            } catch (e) {
                console.error('Edge fetch failed:', e);
                return null;
            }
        };

        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').then(reg => {
                getToken(messaging, { serviceWorkerRegistration: reg }).catch(e => console.error('FCM token failed:', e));
            }).catch(e => console.error('Service Worker failed:', e));
        }

        // Main App Component
        const App = memo(() => {
            const [user, setUser] = useState(null);
            const [cart, setCart] = useState([]);
            const [points, setPoints] = useState(0);
            const [tier, setTier] = useState('Bronze');
            const [theme, setTheme] = useState(localStorage.getItem('theme') || 'default');
            const [language, setLanguage] = useState(navigator.language.split('-')[0] || 'en');
            const [currency, setCurrency] = useState('USD');
            const [bundles, setBundles] = useState([]);
            const [chatQuery, setChatQuery] = useState('');
            const [chatResponse, setChatResponse] = useState('Ask away!');
            const [liveChatMessages, setLiveChatMessages] = useState([]);
            const [quiz, setQuiz] = useState(null);
            const [loading, setLoading] = useState({ bundles: false, chatbot: false, consent: false, analytics: false, reviews: false, subscriptions: false, quiz: false });
            const [error, setError] = useState(null);
            const [flConsent, setFlConsent] = useState(localStorage.getItem('flConsent') === 'true');
            const [twoFAEnabled, setTwoFAEnabled] = useState(false);
            const [challenge, setChallenge] = useState({ name: 'First Purchase', points: 50, timeLeft: 24 * 3600 });
            const [analytics, setAnalytics] = useState({ purchases: [], savings: 0 });
            const [reviews, setReviews] = useState([]);
            const [subscriptions, setSubscriptions] = useState([]);
            const [forumPosts, setForumPosts] = useState([]);
            const [wearableData, setWearableData] = useState(null);

            // Auth and Storage Init
            useEffect(() => {
                const init = async () => {
                    onAuthStateChanged(auth, async u => {
                        if (!u) {
                            setUser(null);
                            return;
                        }
                        setUser(u);
                        const dbInstance = await openDB();
                        const tx = dbInstance.transaction(['profiles'], 'readonly');
                        const store = tx.objectStore('profiles');
                        const profile = await store.get(u.uid);
                        if (profile) {
                            setCart(profile.cart || []);
                            setPoints(profile.points || 0);
                            setTier(profile.tier || 'Bronze');
                            setTwoFAEnabled(profile.twoFAEnabled || false);
                            setCurrency(profile.currency || 'USD');
                        }
                        localStorage.setItem('theme', theme);
                        localStorage.setItem('language', language);
                        localStorage.setItem('currency', currency);
                        document.body.className = theme;
                        // Fetch analytics
                        setLoading(prev => ({ ...prev, analytics: true }));
                        try {
                            const purchases = await getDocs(collection(db, `carts/${u.uid}/purchases`));
                            const purchaseData = purchases.docs.map(doc => doc.data());
                            const savings = purchaseData.reduce((sum, p) => sum + (p.originalPrice - p.price), 0);
                            setAnalytics({ purchases: purchaseData, savings });
                        } catch (e) {
                            setError('Failed to load analytics');
                        } finally {
                            setLoading(prev => ({ ...prev, analytics: false }));
                        }
                        // Fetch reviews
                        setLoading(prev => ({ ...prev, reviews: true }));
                        try {
                            const reviewData = await fetchFromServerless('reviews', { userId: u.uid });
                            setReviews(reviewData?.reviews || []);
                        } catch (e) {
                            setError('Failed to load reviews');
                        } finally {
                            setLoading(prev => ({ ...prev, reviews: false }));
                        }
                        // Fetch subscriptions
                        setLoading(prev => ({ ...prev, subscriptions: true }));
                        try {
                            const subData = await fetchFromServerless('subscriptions', { userId: u.uid });
                            setSubscriptions(subData?.subscriptions || []);
                        } catch (e) {
                            setError('Failed to load subscriptions');
                        } finally {
                            setLoading(prev => ({ ...prev, subscriptions: false }));
                        }
                        // Fetch forum posts
                        try {
                            const posts = await getDocs(collection(db, 'forum'));
                            setForumPosts(posts.docs.map(doc => doc.data()));
                        } catch (e) {
                            setError('Failed to load forum posts');
                        }
                        // Fetch wearable data
                        try {
                            const wearable = await fetchFromServerless('wearable-data', { userId: u.uid });
                            setWearableData(wearable?.data || null);
                        } catch (e) {
                            setError('Failed to load wearable data');
                        }
                        // Live chat
                        onValue(ref(rtdb, `chat/${u.uid}`), snapshot => {
                            const messages = snapshot.val() ? Object.values(snapshot.val()) : [];
                            setLiveChatMessages(messages);
                        });
                        // Backup data
                        await fetchFromServerless('backup-data', { userId: u.uid, cart, nursery: profile.nursery || [] });
                        // Load quiz
                        setLoading(prev => ({ ...prev, quiz: true }));
                        try {
                            const quizData = await fetchFromServerless('daily-quiz', { userId: u.uid });
                            setQuiz(quizData || { question: 'What’s best for your baby?', options: ['Formula', 'Diapers', 'Monitor'], answer: 'Formula', points: 10 });
                        } catch (e) {
                            setError('Failed to load quiz');
                        } finally {
                            setLoading(prev => ({ ...prev, quiz: false }));
                        }
                    });
                };
                init();
            }, [theme, language, currency, cart]);

            // FL Consent Popup
            useEffect(() => {
                if (!flConsent && user && !localStorage.getItem('flConsent')) {
                    setTimeout(() => {
                        document.getElementById('fl-consent-modal')?.classList.add('active');
                    }, 1000);
                }
            }, [user, flConsent]);

            // AI-Driven Bundles (Serverless + Edge + FL + Dynamic Pricing + Inventory Alerts + A/B Testing + Wearable Data)
            useEffect(() => {
                if (!user || !flConsent) return;
                const loadBundles = async () => {
                    setLoading(prev => ({ ...prev, bundles: true }));
                    try {
                        let products = await fetchFromServerless('products', { userId: user.uid });
                        if (!products) {
                            products = await fetchFromEdge('products', { userId: user.uid });
                            if (!products) {
                                products = [
                                    { id: 'formula', name: 'Organic Formula', price: 29.99, margin: 0.4, demand: 0.8, originalPrice: 34.99, stock: 100, carbonFootprint: '2kg CO2', affiliateLink: 'https://amazon.com/formula' },
                                    { id: 'monitor', name: 'Smart Monitor', price: 199.99, margin: 0.5, demand: 0.9, originalPrice: 229.99, stock: 50, carbonFootprint: '5kg CO2', affiliateLink: 'https://amazon.com/monitor' },
                                    { id: 'diapers', name: 'Eco Diapers', price: 39.99, margin: 0.45, demand: 0.7, originalPrice: 44.99, stock: 5, carbonFootprint: '1kg CO2', affiliateLink: 'https://amazon.com/diapers' },
                                ];
                            }
                        }
                        // Generate product descriptions
                        const model = await federatedModel();
                        const descriptions = await Promise.all(products.map(p => transformers.generate_text(`Describe ${p.name} for baby`, { model }));
                        products = products.map((p, i) => ({ ...p, description: descriptions[i]?.text || p.name }));
                        // Dynamic pricing with FL personalization
                        const localData = tf.tensor2d(products.map(p => [p.price, p.margin, p.demand, p.stock / 100, wearableData?.sleepHours || 8]));
                        const localLabels = tf.tensor2d(products.map(() => [Math.random()]));
                        await model.fit(localData, localLabels, { epochs: 1 });
                        const weights = model.getWeights().map(w => Array.from(w.dataSync()));
                        await fetchFromServerless('federated-update', { userId: user.uid, weights });
                        const scores = await Promise.all(products.map(p => model.predict(tf.tensor2d([[p.price, p.margin, p.demand, p.stock / 100, wearableData?.sleepHours || 8]])).data()));
                        const abTestGroup = Math.random() < 0.5 ? 'A' : 'B';
                        products = products.map((p, i) => ({
                            ...p,
                            price: p.price * (1 + (p.demand > 0.8 ? 0.05 : 0)) * (tier === 'Gold' ? 0.9 : tier === 'Silver' ? 0.95 : 1) * (1 + scores[i][0] * 0.1) * (abTestGroup === 'A' ? 0.95 : 0.9),
                            alert: p.stock < 10 ? `Only ${p.stock} left!` : null,
                            upsell: p.id === 'diapers' ? { id: 'bib', name: 'Eco Bib', price: 5.99 } : null
                        }));
                        // Mock DQN
                        const state = user.uid;
                        if (!qTable.has(state)) qTable.set(state, products.map(() => Math.random()));
                        const actions = qTable.get(state);
                        const selectBundle = () => {
                            if (Math.random() < 0.1) return [products[Math.floor(Math.random() * products.length)]];
                            const bestIdx = actions.indexOf(Math.max(...actions));
                            return [products[bestIdx], products[(bestIdx + 1) % products.length]];
                        };
                        let bundle = selectBundle();
                        setBundles(bundle);
                        const reward = getReward(bundle);
                        actions[bundle[0].id] += 0.1 * (reward - actions[bundle[0].id]);
                        qTable.set(state, actions);
                        await addDoc(collection(db, 'interactions'), {
                            userId: user.uid,
                            action: 'view_bundle',
                            bundle: bundle.map(b => b.id),
                            timestamp: Date.now(),
                            abTestGroup
                        });
                        // Email campaign
                        if (Math.random() < 0.1) {
                            await fetchFromServerless('send-email', {
                                userId: user.uid,
                                email: user.email,
                                content: `New ${bundle[0].name} bundle for $${bundle[0].price.toFixed(2)}! ${bundle[0].description} ${bundle[0].alert || ''}`
                            });
                        }
                        // Push notification for cart abandonment
                        if (cart.length > 0 && Math.random() < 0.1) {
                            await fetchFromServerless('send-push', {
                                userId: user.uid,
                                message: `Don't forget your ${cart[0].item} in cart!`
                            });
                        }
                    } catch (e) {
                        setError('Failed to load bundles');
                    } finally {
                        setLoading(prev => ({ ...prev, bundles: false }));
                    }
                };
                loadBundles();
            }, [user, flConsent, tier, cart, wearableData]);

            // Voice-Activated Chatbot
            const handleVoiceChat = useCallback(() => {
                if (!window.SpeechRecognition && !window.webkitSpeechRecognition) {
                    setError('Voice recognition not supported');
                    return;
                }
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                const recognition = new SpeechRecognition();
                recognition.lang = language;
                recognition.onresult = e => {
                    const query = e.results[0][0].transcript;
                    setChatQuery(query);
                    handleChat();
                };
                recognition.onerror = () => setError('Voice recognition failed');
                recognition.start();
            }, [handleChat, language]);

            // Chatbot (Serverless + Edge + Transformers.js + Multi-Language + FL)
            const handleChat = useCallback(async () => {
                setLoading(prev => ({ ...prev, chatbot: true }));
                try {
                    const model = await federatedModel();
                    const localData = tf.tensor2d([[chatQuery.length, 0.5, 0.5, 1, wearableData?.sleepHours || 8]]); // Include wearable data
                    const localLabels = tf.tensor2d([[Math.random()]]);
                    await model.fit(localData, localLabels, { epochs: 1 });
                    const weights = model.getWeights().map(w => Array.from(w.dataSync()));
                    await fetchFromServerless('federated-update', { userId: user.uid, weights });
                    const translatedQuery = await fetchFromEdge('translate', { text: chatQuery, targetLang: 'en' });
                    const serverlessResponse = await fetchFromServerless('chatbot', { query: translatedQuery?.text || chatQuery, userId: user?.uid });
                    let response = serverlessResponse?.response || null;
                    if (!response) {
                        const edgeResponse = await fetchFromEdge('chatbot', { query: translatedQuery?.text || chatQuery, userId: user?.uid });
                        response = edgeResponse?.response || 'Ask away!';
                        if (!edgeResponse && chatQuery.toLowerCase().includes('feed my baby')) {
                            const userDoc = await getDoc(doc(db, 'users', user.uid));
                            const age = userDoc.data()?.babyAge || 0;
                            response = age <= 6 ? 'Breast milk or formula every 2-3 hours. Try our Newborn Feeding Bundle!' : 'Pureed fruits and oats. See our Toddler Nutrition Bundle!';
                        }
                    }
                    const generatedResponse = await transformers.generate_text(response, { model });
                    const translatedResponse = await fetchFromEdge('translate', { text: generatedResponse?.text || response, targetLang: language });
                    setChatResponse(translatedResponse?.text || response);
                    await addDoc(collection(db, 'interactions'), {
                        userId: user?.uid,
                        query: chatQuery,
                        response,
                        timestamp: Date.now(),
                    });
                } catch (e) {
                    setChatResponse('Sorry, try again!');
                } finally {
                    setLoading(prev => ({ ...prev, chatbot: false }));
                }
            }, [chatQuery, user, language, wearableData]);

            // Live Chat
            const handleLiveChat = async message => {
                try {
                    await push(ref(rtdb, `chat/${user.uid}`), { message, userId: user.uid, timestamp: Date.now() });
                    const response = await fetchFromServerless('live-chat', { message, userId: user.uid });
                    if (response?.response) {
                        await push(ref(rtdb, `chat/${user.uid}`), { message: response.response, userId: 'bot', timestamp: Date.now() });
                    }
                } catch (e) {
                    setError('Failed to send live chat message');
                }
            };

            // Add to Cart (Serverless + Edge + Shippo + FL + Upsell)
            const addToCart = useCallback(async (item, price, upsell = null) => {
                setLoading(prev => ({ ...prev, bundles: true }));
                try {
                    const model = await federatedModel();
                    const localData = tf.tensor2d([[price, 0.5, 0.5, 1, wearableData?.sleepHours || 8]]); // Include wearable data
                    const localLabels = tf.tensor2d([[Math.random()]]);
                    await model.fit(localData, localLabels, { epochs: 1 });
                    const weights = model.getWeights().map(w => Array.from(w.dataSync()));
                    await fetchFromServerless('federated-update', { userId: user.uid, weights });
                    let shipping = await fetchFromServerless('shipping', { item, userId: user.uid });
                    if (!shipping) {
                        shipping = await fetchFromEdge('shipping', { item, userId: user.uid });
                        if (!shipping) {
                            shipping = { details: 'USPS, 3-5 days, tracking #123456' };
                        }
                    }
                    const updatedCart = [...cart, { item, price, id: uuid(), shipping: shipping.details }, ...(upsell ? [{ item: upsell.name, price: upsell.price, id: uuid(), shipping: shipping.details }] : [])];
                    setCart(updatedCart);
                    const newPoints = points + 50 + (upsell ? 25 : 0);
                    setPoints(newPoints);
                    const newTier = newPoints >= 1000 ? 'Gold' : newPoints >= 500 ? 'Silver' : 'Bronze';
                    setTier(newTier);
                    const dbInstance = await openDB();
                    const tx = dbInstance.transaction(['cart'], 'readwrite');
                    const store = tx.objectStore('cart');
                    await store.put({ id: user.uid, data: updatedCart });
                    await setDoc(doc(db, 'carts', user.uid), { cart: updatedCart });
                    await setDoc(doc(db, 'users', user.uid), { points: newPoints, tier: newTier }, { merge: true });
                } catch (e) {
                    setError('Failed to save cart');
                } finally {
                    setLoading(prev => ({ ...prev, bundles: false }));
                }
            }, [cart, points, user, wearableData]);

            // Theme Toggle
            const toggleTheme = useCallback(() => {
                const themes = ['default', 'dark', 'high-contrast', 'colorblind'];
                const currentIdx = themes.indexOf(theme);
                const newTheme = themes[(currentIdx + 1) % themes.length];
                setTheme(newTheme);
                localStorage.setItem('theme', newTheme);
            }, [theme]);

            // Language Toggle
            const toggleLanguage = useCallback(lang => {
                setLanguage(lang);
                localStorage.setItem('language', lang);
            }, []);

            // Currency Toggle
            const toggleCurrency = useCallback(currency => {
                setCurrency(currency);
                localStorage.setItem('currency', currency);
                if (user) {
                    setDoc(doc(db, 'users', user.uid), { currency }, { merge: true });
                }
            }, [user]);

            // Challenge Timer
            useEffect(() => {
                const timer = setInterval(() => {
                    setChallenge(prev => ({
                        ...prev,
                        timeLeft: prev.timeLeft > 0 ? prev.timeLeft - 1 : 24 * 3600,
                    }));
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            // FL Consent Handling
